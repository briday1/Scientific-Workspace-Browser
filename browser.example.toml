[browser]
title = "Signal Analysis Browser"

[[workspaces]]
use = "workspace_browser.examples.profile:create_sigmf_workspace"
id = "recorded-signals"
name = "Recorded signals"

[workspaces.config]
data_root = "./src/workspace_browser/examples/data"

[[workspaces]]
use = "workspace_browser.examples.profile:create_sigmf_matplotlib_workspace"
id = "recorded-signals-matplotlib"
name = "Recorded signals (Matplotlib)"

[workspaces.config]
data_root = "./src/workspace_browser/examples/data"

[[workspaces]]
use = "workspace_browser.examples.profile:create_lfm_collection_workspace"
id = "lfm-collection"
name = "10 MHz LFM Collection"

[workspaces.config]
data_root = "./data/lfm-collection"

[[workspaces]]
use = "workspace_browser.examples.profile:create_lfm_full_recording_workspace"
id = "lfm-full-recording"
name = "10 MHz LFM Collection (Whole Recording)"

[workspaces.config]
data_root = "./data/lfm-collection"

[[workspaces]]
use = "workspace_browser.examples.profile:create_pri_workspace"
