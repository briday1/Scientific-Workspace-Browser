[browser]
title = "Sigvue Example Pipelines"
subtitle = "Copyable, file-backed workspace implementations"

[[workspaces]]
use = "example_pipelines.waterfall.workspace:create_workspace"
path = ".."
id = "synthetic-lte-waterfall"
name = "Synthetic LTE Waterfall"
description = "Windowed spectrum and waterfall analysis of generated LTE-like uplink and downlink recordings."
category = "spectrum monitoring"
tags = ["windowed", "synthetic", "LTE", "SigMF", "waterfall"]
[workspaces.config]
data_root = "./data/lte"

[[workspaces]]
use = "example_pipelines.comms.workspace:create_workspace"
path = ".."
id = "synthetic-comms"
name = "Synthetic Communications"
description = "Windowed constellation and eye-diagram analysis for generated QPSK, 16-QAM, and 64-QAM recordings."
category = "digital communications"
tags = ["windowed", "synthetic", "SigMF", "QPSK", "16-QAM", "64-QAM"]
[workspaces.config]
data_root = "./data/comms"
